<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tea house practice 2026</title>
<!-- google font cdn -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet">

<!-- font awesome cdn -->
<script src="https://kit.fontawesome.com/cafd8ff586.js" crossorigin="anonymous"></script>
<!-- tailwind cdn -->
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          clifford: '#da373d',
        },
      },
    },
  }
</script>
</head>
<body>
  <main class="max-w-screen-xl mx-auto px-16 lg:px-16">

<header class="flex pt-10 mb-20">
  <div>

    <br>

    <br>
    <button class="bg-linear-to-r from-orange-500 to-red-500 px-5 py-3 rounded-lg text-white font-bold">Explore More <i class="fa-solid fa-arrow-right text-xl -rotate-45"></i></button>

  </div>
  <div class="relative">
    <!-- image content -->
  <div>
    <!-- image  -->
     <img src="/tea-house-practise-with-tailwind/images/banner.png" alt="">

  </div>
  <!-- card -->
   <div class="absolute flex items-center bg-white shadow-lg px-2 py-2 md:px-10 lg:py-4 rounded-lg top-28 md:top-80 md:left-32 lg:left-28">

    <div><i class="fa-solid fa-star text-2xl text-amber-500"></i></div>

    <div class="ml-2">
      <h2 class="lg:2xl font-bold">5.00</h2>
      <p class="text-gray-500">Trust Pilot  Ratings</p>
